# html2epub config for "Building Temporal AI: From Forecasting to Sequential Decision Making"
# Run: python -m html2epub build .
[book]
title = "Building Temporal AI: From Forecasting to Sequential Decision Making"
subtitle = "A practitioner's guide to time series, temporal deep learning, foundation models, and sequential decision making"
edition = "Second Edition"
language = "en"
identifier = "urn:uuid:85914f1c-f1a9-4240-b74d-9553dd44bb26"
publisher = "Apartsin & Aperstein"
rights = "Copyright (c) 2026 Alexander Apartsin and Yehudit Aperstein. All rights reserved."
publication_date = "2026-06-16"
description = """A practitioner's guide to temporal AI in 36 chapters across nine parts: foundations \
and temporal data engineering, classical forecasting and time series analysis, temporal deep \
learning, representation learning, uncertainty and online learning, sequential decision making, \
intelligent temporal systems, trustworthy deployment, and applications. Every core idea is built \
from scratch and then shown with the modern library that makes it a few lines of code. Covers \
stationarity and the frequency domain, ARIMA and state-space filtering, RNNs, temporal \
convolutions and Transformers, structured state-space and continuous-time models, deep and \
foundation forecasters, self-supervised and generative temporal models, point processes, \
probabilistic and conformal forecasting, online and continual learning, MDPs and POMDPs, deep \
reinforcement learning, control and imitation, decision transformers and world models, temporal \
causality and agents, spatio-temporal modeling, interpretability and MLOps, with 220 \
illustrations, hands-on labs, and exercises, told as one connected story in which every classical \
idea returns in learned form."""
keywords = [
  "time series forecasting ARIMA Prophet Python tutorial",
  "temporal deep learning RNN LSTM Transformer PyTorch",
  "state space models Kalman filter Mamba S4",
  "reinforcement learning MDP POMDP decision transformer",
  "probabilistic forecasting conformal prediction uncertainty",
  "foundation models Chronos TimesFM time series",
]

[[book.authors]]
name = "Alexander Apartsin"
file_as = "Apartsin, Alexander"
role = "aut"

[[book.authors]]
name = "Yehudit Aperstein"
file_as = "Aperstein, Yehudit"
role = "aut"

[content]
source_dir = "."
spine = "auto"
front_matter_dir = "front-matter"
parts_glob = "part-*"
module_glob = "module-*"
appendices_dir = "appendices"
capstone_dir = "capstone"
section_glob = "section-*.html"
fm_order = [
  "foreword.html",
  "fm-what-this-book-covers.html",
  "fm-who-should-read.html",
  "look-inside-preview.html",
  "fm-how-to-use.html",
  "about-authors.html",
  "copyright.html",
]

[styling]
stylesheets = ["styles/book.css", "styles/pygments.css"]

[math]
render = "katex"
node_exe = "node"
katex_path = "KDP/build/node_modules"

[images]
max_side = 1100
jpeg_quality = 80
compress_pngs = true

[cover]
path = "KDP/cover/cover_kdp.jpg"

[transforms]
wide_table_min_cols = 6
slim_index_lists = true
drop_inline_style_over = 1500
# Drop web-only chrome: search box + its assets, analytics, and client-side
# book.js / KaTeX-autorender / Prism scripts (the EPUB renders math and code at
# build time, so none of the runtime JS is needed).
drop_selectors = [
  ".no-epub",
  ".header-search",
  "script[src*='pagefind']",
  "link[href*='pagefind']",
  "script[src*='analytics']",
  "script[src*='book.js']",
]

[output]
epub = "KDP/output/building-temporal-ai.epub"

[optimize]
repair_entities = true
