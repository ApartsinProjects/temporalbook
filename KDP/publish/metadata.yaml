# KDP description field (<= 4000 chars, limited HTML allowed). Plain version:
description: >
  Building Temporal AI is a practitioner's guide to temporal artificial intelligence in 36
  chapters across nine parts: foundations and temporal data engineering, classical forecasting
  and time series analysis, temporal deep learning, representation learning, uncertainty and
  online learning, sequential decision making, intelligent temporal systems, trustworthy
  deployment, and applications. Every core idea is built from scratch and then shown with the
  modern library that makes it a few lines of code. It covers stationarity and the frequency
  domain, ARIMA and exponential smoothing, multivariate and econometric models, state-space
  models and the Kalman filter, anomaly and change-point detection, recurrent networks, temporal
  convolutions and Transformers, structured state-space and continuous-time models, deep and
  foundation forecasters such as DeepAR, N-BEATS, PatchTST, Chronos and TimesFM, self-supervised
  and generative temporal models, temporal point processes, probabilistic and conformal
  forecasting, online and continual learning under drift, Markov and partially observable decision
  processes, bandits and deep reinforcement learning, optimal control and imitation, decision
  transformers and world models, temporal causality and agents, spatio-temporal modeling,
  interpretability, robustness and MLOps. With 220 illustrations, inline diagrams, runnable code,
  hands-on labs, and exercises, it takes you from your first NumPy time series to foundation
  forecasters and sequence-model agents, told as one connected story in which every classical idea
  returns in learned form: the Kalman filter becomes the RNN and the state-space model, the HMM
  becomes the belief-state agent, the MDP becomes a sequence model.

